<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Choice</title>
    <link rel="stylesheet" href="game-choice.css">
</head>
<body>
    <div class="flex-grid">
        <div id="game-choice-header" class="row_header">
            <p id="left-game-choice-title" class="mover_title left-game">FURNITURE MOVER</p>
            <p id="right-game-choice-title" class="snake_title right-game">SNAKE</p>
        </div>
        <div id="game-images" class="row_header">
            <img id="left-game-image" class="game-image left-game" src="Game_Choice_Assets\House.png" alt="Furniture Mover Game Image">
            <img id="right-game-image" class="game-image right-game" src="Game_Choice_Assets\Tree.png" alt="Snake Game Image">
        </div>
        <div id="game-buttons" class="row_header">
            <button id="luggage-game-button" class="play-button left-button"></button>
            <button id="roguelike-game-button" class="play-button right-button"></button>
        </div>
    </div>

    <script src="game-choice.js"></script>
</body>
</html>
