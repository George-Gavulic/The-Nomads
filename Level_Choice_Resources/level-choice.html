<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Level Choice Page</title>
    <link rel="stylesheet" href="level-choice.css">
  </head>
  <body id="body1">
    <div id ="level-choice">
            <!-- <h2>Level Select</h2> -->
            <div id="game-header">
                <h1>Choose a Level!</h1>
                <button id="back-to-game-choice">Return to Games</button>
            </div>
            <div class="level-grid">
                <div class="level-button-row">
                    <button class="level-button locked" id="level1">Level 1</button><!-- id is used to identify which level is being clicked on in the js file -->
                    <button class="level-button locked" id="level2">Level 2</button>
                    <button class="level-button locked" id="level3">Level 3</button>
                    <button class="level-button locked" id="level4">Level 4</button>
                </div>
                <div class="level-button-row">
                    <button class="level-button locked" id="level5">Level 5</button>
                    <button class="level-button locked" id="level6">Level 6</button>
                    <button class="level-button locked" id="level7">Level 7</button>
                    <button class="level-button locked" id="level8">Level 8</button>
                </div>
                <div class="level-button-row">
                    <button class="level-button locked" id="level9">Level 9</button>
                    <button class="level-button locked" id="level10">Level 10</button>
                    <button class="level-button locked" id="level11">Level 11</button>
                    <button class="level-button locked" id="level12">Level 12</button>
                </div>
                <div class="level-button-row">
                    <button class="level-button locked" id="level13">Level 13</button>
                    <button class="level-button locked" id="level14">Level 14</button>
                    <button class="level-button locked" id="level15">Level 15</button>
                    <button class="level-button locked" id="level16">Level 16</button>
                </div>
            </div>
    </div>
    <button id="mute-btn" class="global-mute-btn">🔊</button>
    <script src="level-choice.js" type="module"></script>
    <input id="volume-slider" type="range" min="0" max="1" step="0.01">
  </body>
</html>
